<!doctype html>
<html>
  <head>
    <title>GitHub PR Tool</title>
    <script src="assets/js/popup.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/popup.css" />
  </head>

  <body>
    <div id="update-notification" class="update-notification" hidden>
      <a id="update-link" class="update-link" target="_blank" rel="noopener noreferrer">
        <svg aria-hidden="true" viewBox="0 0 16 16" version="1.1">
          <path
            d="M8 1.5c-2.363 0-4 1.69-4 3.75 0 .984.424 1.625.984 2.304l.214.253c.223.264.47.556.673.848.284.411.537.896.621 1.49a.75.75 0 0 1-1.484.211c-.04-.282-.163-.547-.37-.847a8.456 8.456 0 0 0-.542-.68c-.084-.1-.173-.205-.268-.32C3.201 7.75 2.5 6.766 2.5 5.25 2.5 2.31 4.863 0 8 0s5.5 2.31 5.5 5.25c0 1.516-.701 2.5-1.328 3.259-.095.115-.184.22-.268.319-.207.245-.383.453-.541.681-.208.3-.33.565-.37.847a.751.751 0 0 1-1.485-.212c.084-.593.337-1.078.621-1.489.203-.292.45-.584.673-.848.075-.088.147-.173.213-.253.561-.679.985-1.32.985-2.304 0-2.06-1.637-3.75-4-3.75ZM5.75 12h4.5a.75.75 0 0 1 0 1.5h-4.5a.75.75 0 0 1 0-1.5ZM6 15.25a.75.75 0 0 1 .75-.75h2.5a.75.75 0 0 1 0 1.5h-2.5a.75.75 0 0 1-.75-.75Z"
          />
        </svg>
        <span><strong id="update-version"></strong> - See what's new</span>
      </a>
      <button id="dismiss-update-btn" class="dismiss-update-btn" title="Dismiss" aria-label="Dismiss">
        <svg aria-hidden="true" viewBox="0 0 16 16" version="1.1">
          <path
            d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.75.75 0 1 1 1.06 1.06L9.06 8l3.22 3.22a.75.75 0 1 1-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 0 1-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"
          />
        </svg>
      </button>
    </div>
    <h1>GitHub PR Tool</h1>
    <div class="btn-group">
      <button id="check-all-files-btn" class="btn btn-check-all">Check all</button>
      <button id="uncheck-all-files-btn" class="btn btn-uncheck-all">Uncheck all</button>
    </div>
    <div id="progress-container" class="progress-container" hidden>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </div>
    <a
      href="https://github.com/8Thomas8/github-pr-tool-chrome-extension/issues"
      target="_blank"
      rel="noopener noreferrer"
      class="report-issue-link"
    >
      Report an issue
    </a>
  </body>
</html>
